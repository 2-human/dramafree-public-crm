<style>
:root{color-scheme:light;--df-green:#008F67;--df-green-dark:#02714f;--df-teal:#244858;--df-coral:#FF8562;--df-red:#E51B21;--surface-base:#FAF8F3;--surface-soft:#f3ede2;--neutral-deep:#2B2B2B;--text-muted:#5a5a60;--rule:#E4E0D8}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;color:var(--neutral-deep);background:var(--surface-base);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.gate{max-width:440px;width:100%;background:#fff;border:1px solid var(--rule);border-radius:12px;padding:32px 28px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.gate h1{margin:0 0 6px;font-size:18px;font-weight:600;color:var(--df-teal)}
.gate .sub{margin:0 0 24px;font-size:13px;color:var(--text-muted);line-height:1.5}
.gate form{display:flex;flex-direction:column;gap:10px}
.gate input{padding:10px 12px;font-size:14px;border:1px solid var(--rule);border-radius:6px;background:var(--surface-base);font-family:inherit;color:var(--neutral-deep)}
.gate input:focus{outline:none;border-color:var(--df-green);box-shadow:0 0 0 3px rgba(0,143,103,.15)}
.gate button{padding:10px 14px;font-size:14px;font-weight:600;border:1px solid var(--df-green);background:var(--df-green);color:#fff;border-radius:6px;cursor:pointer;font-family:inherit}
.gate button:hover{background:var(--df-green-dark)}
.gate button:disabled{opacity:.6;cursor:wait}
.gate .err{margin-top:10px;font-size:13px;color:var(--df-red);min-height:18px}
.gate .note{margin-top:18px;padding-top:16px;border-top:1px solid var(--rule);font-size:12px;color:var(--text-muted);line-height:1.5}
</style>
</head>

function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function decrypt(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:b64(PAYLOAD.salt),iterations:PAYLOAD.iter,hash:"SHA-256"},
    km,{name:"AES-GCM",length:256},false,["decrypt"]
  );
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(PAYLOAD.iv)},key,b64(PAYLOAD.ct));
  return new TextDecoder().decode(pt);
}
document.getElementById("f").addEventListener("submit",async e=>{
  e.preventDefault();
  const b=document.getElementById("b");
  const er=document.getElementById("e");
  er.textContent="";
  b.disabled=true;b.textContent="Decrypting…";
  try{
    const html=await decrypt(document.getElementById("pw").value);
    document.open();document.write(html);document.close();
  }catch(err){
    er.textContent="Incorrect password.";
    b.disabled=false;b.textContent="Decrypt";
  }
});
</script>
